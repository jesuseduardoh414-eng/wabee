# ─── WABEE — entorno local con Docker Compose ─────────────────────────────────
# Uso:
#   export NODE_AUTH_TOKEN=ghp_...   (token de GitHub Packages para @r4d-26/core)
#   docker compose up --build
#
# La API lee sus variables desde wabee-api/.env (DATABASE_URL puede apuntar a
# Supabase remoto o al servicio postgres local de abajo si lo activas).

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  api:
    build:
      context: ./wabee-api
      secrets:
        - node_auth
    env_file:
      - ./wabee-api/.env
    environment:
      REDIS_ENABLED: "true"
      REDIS_URL: redis://redis:6379
    ports:
      - "4000:4000"
    depends_on:
      - redis
    restart: unless-stopped

  web:
    build:
      context: ./wabee-web
      args:
        VITE_API_URL: http://localhost:4000/v1
    ports:
      - "8080:80"
    depends_on:
      - api
    restart: unless-stopped

  # ── Postgres local opcional (descomenta y apunta DATABASE_URL a él) ──
  # postgres:
  #   image: postgres:16-alpine
  #   environment:
  #     POSTGRES_USER: wabee
  #     POSTGRES_PASSWORD: wabee
  #     POSTGRES_DB: wabee
  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - pgdata:/var/lib/postgresql/data

# volumes:
#   pgdata:

secrets:
  node_auth:
    environment: NODE_AUTH_TOKEN
