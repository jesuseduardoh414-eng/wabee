<!doctype html>
<html lang="en" class="light-theme">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Preconnect a Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Importación de las tipografías del módulo de Branding -->
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Manrope:wght@200..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    
    <script>
        (() => {
            const root = document.documentElement;
            let theme = 'light';

            try {
                const savedPrefs = localStorage.getItem('wabee_prefs');
                if (savedPrefs) {
                    const prefs = JSON.parse(savedPrefs);
                    if (prefs.theme === 'light' || prefs.theme === 'dark') theme = prefs.theme;
                } else {
                    const savedUser = localStorage.getItem('wabee_user');
                    if (savedUser) {
                        const user = JSON.parse(savedUser);
                        const savedTheme = user?.preferences?.theme;
                        if (savedTheme === 'light' || savedTheme === 'dark') theme = savedTheme;
                    }
                }
            } catch (_) { }

            root.classList.toggle('light-theme', theme === 'light');
        })();
    </script>
    <title>Wabee</title>
</head>

<body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
</body>

</html>
