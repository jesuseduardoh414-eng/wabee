<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Wabee Inbox — Rediseño</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
/* ============================================================
   WABEE INBOX — DESIGN SYSTEM
   Paleta estricta (5): morado / naranja / amarillo / carbón / crema
   Espaciado base 8 · Escala tipográfica 12·14·16·20 · Radios unificados
   ============================================================ */
:root{
  /* --- Brand (strict) --- */
  --purple:#9524E3;          /* PRIMARIO */
  --purple-strong:#7d18c4;   /* hover/pressed (tono del morado) */
  --orange:#FF8C00;          /* ADVERTENCIA / urgente */
  --yellow:#FFD700;          /* ACENTO mínimo */
  --charcoal:#1A1A1A;        /* texto / estructura */
  --cream:#F4F4DC;           /* crema */

  /* --- Surfaces (white + cream wash, sin colores nuevos) --- */
  --surface:#FFFFFF;
  --canvas:#FBFBF4;          /* crema muy diluida sobre blanco */
  --rail:#F7F7EC;            /* riel de canales */

  /* --- Ink scale (tintes de carbón, no son colores nuevos) --- */
  --ink:#1A1A1A;
  --ink-2:rgba(26,26,26,.70);
  --ink-3:rgba(26,26,26,.50);
  --ink-4:rgba(26,26,26,.34);

  /* --- Lines --- */
  --line:rgba(26,26,26,.08);
  --line-2:rgba(26,26,26,.13);
  --line-strong:rgba(26,26,26,.20);

  /* --- Purple tints (derivados del primario) --- */
  --purple-06:rgba(149,36,227,.055);  /* fondo seleccionado / burbuja enviada */
  --purple-10:rgba(149,36,227,.10);
  --purple-14:rgba(149,36,227,.14);
  --purple-22:rgba(149,36,227,.22);

  /* --- Orange / yellow tints --- */
  --orange-10:rgba(255,140,0,.12);
  --orange-22:rgba(255,140,0,.26);
  --yellow-14:rgba(255,215,0,.18);

  /* --- Accent intensity (controlado por Tweaks) --- */
  --accent:var(--purple);
  --accent-06:var(--purple-06);
  --accent-10:var(--purple-10);
  --accent-14:var(--purple-14);
  --accent-22:var(--purple-22);
  --accent-strong:var(--purple-strong);

  /* --- Radii (unificados) --- */
  --r-xs:6px;
  --r-sm:8px;
  --r-md:10px;
  --r-lg:14px;
  --r-full:999px;

  /* --- Elevation (sombras carbón muy suaves) --- */
  --sh-1:0 1px 2px rgba(26,26,26,.04);
  --sh-2:0 4px 12px rgba(26,26,26,.06);
  --sh-3:0 12px 32px rgba(26,26,26,.10);
  --sh-pop:0 16px 44px rgba(26,26,26,.16);

  /* --- Type --- */
  --font:"Geist", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  --mono:"Geist Mono", ui-monospace, "SF Mono", Menlo, monospace;

  /* density (set by JS via .density-*) */
  --row-py:10px;
  --gap:8px;
}

*{box-sizing:border-box;}
html,body{margin:0;height:100%;}
body{
  font-family:var(--font);
  background:var(--charcoal);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
input,textarea{font-family:inherit;}
::selection{background:var(--accent-22);}

/* Scrollbars — discretos */
.scroll{scrollbar-width:thin;scrollbar-color:var(--line-2) transparent;}
.scroll::-webkit-scrollbar{width:8px;height:8px;}
.scroll::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:99px;border:2px solid transparent;background-clip:content-box;}
.scroll::-webkit-scrollbar-thumb:hover{background:var(--line-strong);background-clip:content-box;}
.no-scrollbar::-webkit-scrollbar{display:none;}
.no-scrollbar{scrollbar-width:none;}

/* ---- App frame: centered, fills viewport with margin ---- */
#root{height:100%;display:flex;align-items:center;justify-content:center;}
.app-stage{
  width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  padding:0;
}

/* ====================== TYPE TOKENS ====================== */
.t-meta{font-size:12px;line-height:1.3;font-weight:500;letter-spacing:.01em;}
.t-mono{font-family:var(--mono);font-size:11.5px;letter-spacing:.02em;font-weight:500;}
.t-sec{font-size:13px;line-height:1.45;font-weight:400;}
.t-body{font-size:14px;line-height:1.5;font-weight:400;}
.t-strong14{font-size:14px;line-height:1.4;font-weight:600;}
.t-msg{font-size:15px;line-height:1.55;font-weight:400;}
.t-title{font-size:16px;line-height:1.35;font-weight:600;letter-spacing:-.01em;}
.t-h{font-size:20px;line-height:1.25;font-weight:700;letter-spacing:-.02em;}
.t-display{font-size:26px;line-height:1.2;font-weight:700;letter-spacing:-.025em;}

/* uppercase micro label */
.t-eyebrow{font-size:10.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;}

/* ====================== ANIM ====================== */
@keyframes fadeUp{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
@keyframes popIn{from{opacity:0;transform:scale(.96);}to{opacity:1;transform:none;}}
@keyframes pulseDot{0%,100%{opacity:1;}50%{opacity:.35;}}
@keyframes slideIn{from{transform:translateX(100%);}to{transform:none;}}
@keyframes spin{to{transform:rotate(360deg);}}
.anim-fade{animation:fadeUp .26s cubic-bezier(.2,.7,.3,1) forwards;}
.anim-pop{animation:popIn .2s cubic-bezier(.2,.7,.3,1) forwards;}

/* ====================== INTERACTION STATES ====================== */
.wb-row:hover[data-sel=""]{background:rgba(26,26,26,.035) !important;}
.wb-row:active{transform:scale(.995);}
.wb-icon:hover{background:rgba(26,26,26,.05);color:var(--ink-2);}
.wb-icon:active{transform:scale(.94);}
.wb-btn{transition:all .15s;}
.wb-btn:hover{filter:brightness(.98);}
.wb-btn-primary:hover{background:var(--accent-strong) !important;filter:none;}
.wb-btn-secondary:hover{border-color:var(--line-strong) !important;background:rgba(26,26,26,.02) !important;}
.wb-btn-ghost:hover{background:rgba(26,26,26,.04) !important;}
.wb-btn:active{transform:scale(.97);}
.wb-btn:focus-visible,.wb-chip:focus-visible,.wb-row:focus-visible,.wb-icon:focus-visible,
.wb-chan:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
.wb-chip:hover{border-color:var(--line-strong);}
.wb-chip:active{transform:scale(.96);}
.wb-chan:hover{background:rgba(26,26,26,.04);}
.wb-search:focus-within,.wb-composer:focus-within{border-color:var(--accent) !important;box-shadow:0 0 0 3px var(--accent-06);}
.wb-send:not(:disabled):hover{filter:brightness(.96);}
.wb-send:not(:disabled):active{transform:scale(.95);}
textarea::placeholder,input::placeholder{color:var(--ink-4);}

/* Mono metadata toggle OFF → use sans for .t-mono */
body.mono-off .t-mono{font-family:var(--font);letter-spacing:0;}
</style>
</head>
<body>
<div id="root"></div>

</body>
